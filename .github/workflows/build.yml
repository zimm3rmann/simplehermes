name: Build

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-24.04
            artifact_name: simplehermes-linux-amd64
            output_path: dist/simplehermes-linux-amd64
            build_tags: production webkit2_41
          - name: windows-amd64
            os: windows-2022
            artifact_name: simplehermes-windows-amd64
            output_path: dist/simplehermes-windows-amd64.exe
            build_tags: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build desktop binary
        shell: bash
        run: |
          mkdir -p dist
          go build -tags "${{ matrix.build_tags }}" -o "${{ matrix.output_path }}" ./cmd/simplehermes

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_path }}
          if-no-files-found: error
